# Taskfile for go-stashbox. See https://taskfile.dev
#
# The rituals that gate every change live here:
#   check     gofmt, build, vet, test -race, lint, tidy, codegen-freshness
#   generate  regenerate the typed surface (genops, then genqlient)
#   build     compile the stash-box CLI
#   schema    refresh the vendored stash-box SDL at the pinned tag, re-stamp, regenerate
#   vuln      scan for known vulnerabilities (stdlib CVEs matter for a static binary)
#   release   cut a real release with GoReleaser (tag-driven; runs in CI)
#   snapshot  dry-run the release locally (no tag, no publish)
#   release-check  validate .goreleaser.yaml
version: '3'

tasks:
  check:
    desc: All quality gates — gofmt, build, vet, test -race, lint, tidy, codegen freshness.
    cmds:
      - cmd: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt: the following files need formatting:"; echo "$unformatted"; exit 1
          fi
      - go build ./...
      - go vet ./...
      - go test -race ./...
      - golangci-lint run
      - go mod tidy -diff
      - task: generate
      # Codegen freshness: regeneration must not change any committed generated
      # artifact. Scoped to the generated files so unrelated working-tree edits
      # do not trip the gate.
      - >-
        git diff --exit-code --
        internal/gen/generated
        schema/catalog.json schema/version_gen.go
        stashbox/operations_gen.go
        cmd/stashbox/gen_commands.go cmd/stashbox/catalog.json

  generate:
    desc: Regenerate the typed GraphQL surface (genops then genqlient, via go:generate directives).
    cmds:
      - go generate ./...

  build:
    desc: Build the stash-box CLI to ./bin/stashbox.
    cmds:
      - go build -o bin/stashbox ./cmd/stashbox

  schema:
    desc: Refresh the vendored stash-box SDL at the pinned tag (schema/version.txt), re-stamp, and regenerate.
    cmds:
      - bash schema/refresh.sh
      # A schema refresh that didn't regenerate the typed surface leaves the
      # tree inconsistent (new SDL, stale generated code). Always regenerate so
      # any drift surfaces as a diff here, not as a red build later.
      - task: generate

  vuln:
    desc: Scan for known vulnerabilities (stdlib + dependencies) with govulncheck.
    cmds:
      # Pinned, not @latest: a reproducible, auditable scanner version. Bump
      # deliberately rather than letting the tool float under you.
      - go run golang.org/x/vuln/cmd/govulncheck@v1.4.0 ./...

  release-check:
    desc: Validate the GoReleaser config (.goreleaser.yaml) without building anything.
    cmds:
      - goreleaser check

  snapshot:
    desc: Dry-run the release locally with GoReleaser (builds to ./dist, no tag, no publish).
    cmds:
      - goreleaser release --snapshot --clean

  release:
    desc: Cut a real release with GoReleaser (tag-driven; normally invoked by CI on a v* tag).
    cmds:
      - goreleaser release --clean
