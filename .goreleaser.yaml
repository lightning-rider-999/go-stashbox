# GoReleaser configuration for the `stashbox` CLI.
#
# A pushed `v*` git tag triggers .github/workflows/release.yml, which runs
# `goreleaser release --clean` to build the cross-platform binaries and publish
# them on a GitHub Release. Validate locally with `goreleaser check` (Taskfile:
# `task release-check`) and dry-run with `goreleaser release --snapshot --clean`
# (`task snapshot`).
#
# Docs: https://goreleaser.com
version: 2

project_name: stashbox

before:
  hooks:
    # A release builds the committed module graph; it must not reshape it.
    # Download deps, then verify them against go.sum — never `go mod tidy`,
    # which would mutate go.mod/go.sum mid-release.
    - go mod download
    - go mod verify

builds:
  - id: stashbox
    main: ./cmd/stashbox
    binary: stashbox
    # The CLI is pure Go (an HTTP GraphQL client, no CGO deps), so a static
    # cross-compile is correct for every target in the matrix.
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # -trimpath strips absolute CI/workspace paths from the binary so the same
    # input tree yields byte-identical output on any machine (reproducibility).
    flags:
      - -trimpath
    # Strip DWARF/symbol tables and inject build info into package main. These
    # -X paths are the release contract with cmd/stashbox/main.go's version vars.
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      # Commit time, not build wall-clock, so the stamp is reproducible and
      # matches the mod_timestamp source below.
      - -X main.date={{ .CommitDate }}
    # Pin the binary's build timestamp to the commit time for reproducible
    # builds (same input tree -> byte-identical output).
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: stashbox
    ids:
      - stashbox
    # tar.gz everywhere except Windows, which gets a zip.
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    # Ship the LICENSE alongside the binary so the grant travels with the
    # artifact; the README is online and adds nothing to a single-binary CLI
    # archive. tar.gz/zip both preserve the binary's exec bit, so extract-and-run
    # needs no chmod.
    files:
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: git
  sort: asc
  filters:
    # Drop chore-noise commits from the release notes; keep feat/fix/etc.
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "^refactor:"
      - "merge conflict"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  # Publish as a full release (not a draft) so the tag push ships immediately.
  draft: false
  # Mark pre-release automatically for tags like v1.2.3-rc1.
  prerelease: auto

# Publish a Homebrew cask to the lightning-rider-999 tap so macOS/Linux users can
# `brew install lightning-rider-999/tap/stashbox`. A cask (not the deprecated
# `brews:`/formula, removed-by-default in GoReleaser v2.16) wraps the prebuilt
# release archive rather than building from source.
homebrew_casks:
  - name: stashbox
    # Wrap the archives built from the `stashbox` build (see builds[].id above);
    # a drift there is a red build, not a silent mismatch.
    ids:
      - stashbox
    binaries:
      - stashbox
    homepage: "https://github.com/lightning-rider-999/go-stashbox"
    description: "Go client/library & CLI for stash-box's GraphQL API (StashDB and any stash-box instance)"
    license: "MIT"
    # Push the generated cask to the separate tap repo. The token is a PAT
    # (CI secret HOMEBREW_TAP_GITHUB_TOKEN) because the workflow's GITHUB_TOKEN
    # can't write to another repository.
    repository:
      owner: lightning-rider-999
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    # GoReleaser pushes the tap commit from CI (not via local git/hooks), so this
    # author is the ONLY control over the tap commit's identity — keep it the
    # lightning-rider-999 noreply.
    commit_author:
      name: lightning-rider-999
      email: 293808812+lightning-rider-999@users.noreply.github.com
    # Don't push the cask for prerelease tags (e.g. v1.0.0-rc1).
    skip_upload: auto
    # The binary isn't code-signed/notarized, so strip the quarantine xattr on
    # install to avoid Gatekeeper blocking it on first run.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/stashbox"]
          end

snapshot:
  # Local `--snapshot` builds get a deterministic, sortable version stamp.
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"
