name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel an in-progress run when a newer commit lands on the same ref; a stale
# CI result helps no one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (gofmt, build, vet, test -race, lint, tidy, codegen + docs freshness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Reads the `go 1.26.x` directive; GOTOOLCHAIN=auto fetches it if the
          # runner ships an older toolchain.
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install golangci-lint
        # Official action: SHA-pinned and checksum-verifies its download. v9 is
        # the action major that targets golangci-lint v2.x. `install-only` puts
        # the binary on PATH without running it here, because `task check` invokes
        # `golangci-lint run` itself.
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          install-mode: binary
          install-only: true

      - name: task check
        # Full quality suite: gofmt, build, vet, test -race, lint, tidy, codegen +
        # docs freshness. The codegen step runs `go generate ./...`, which `go run`s
        # genops (github.com/trackness/graphql-opgen, published) and the genqlient
        # tool straight from the committed module graph — no `go get -tool`, so the
        # forced golang.org/x/tools >= v0.46.0 bump in go.mod is left intact (a
        # `go get -tool` would re-pin it to genqlient's broken v0.24.0). The
        # committed cmd/stashbox/* and stashbox/operations_gen.go must regenerate
        # byte-identical, or the freshness git-diff fails the job. The docs step then
        # regenerates the markdown CLI reference (GEN_CLI_DOCS=1 go test ...) and
        # git-diffs docs/cli/, so a command-tree change with stale docs fails too.
        # Both gates live in the Taskfile; CI enforces them by running `task check`.
        run: task check

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        # Pinned (not @latest) so the scanner version is reproducible; bump
        # deliberately. stdlib CVEs matter for a static binary. Matches the
        # version pinned in Taskfile.yml's `vuln` task.
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.4.0 ./...
