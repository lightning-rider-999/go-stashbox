# genqlient configuration. The schema is stash-box's FULL vendored SDL
# (schema/) — a superset of the query-only surface; operations and fragments are
# generated by genops ahead of genqlient (see generate.go). Custom scalars are
# bound to Go types below.
schema:
  - schema/*.graphql
  - schema/types/*.graphql

operations:
  - internal/gen/generated/*.graphql

generated: stashbox/operations_gen.go
package: stashbox

# Struct-typed fields become pointers: required so any self-referential filter
# input is not an infinitely-sized value type, and it makes nullable entity edges
# pointer-canonical (e.g. *StudioRef).
use_struct_references: true

# Nullable fields become pointers with omitempty. On the input side this is a
# correctness requirement: a value-typed optional field is always marshalled, so
# an unset enum is sent as "" and the server rejects it (" is not a valid
# SortDirectionEnum"). Pointers let an unset optional field be omitted from the
# request. On the output side it distinguishes a JSON null from a zero value.
optional: pointer

bindings:
  # Time is an RFC3339 datetime scalar -> time.Time.
  Time:
    type: time.Time
  # Date is a calendar date (YYYY-MM-DD) with no time component; kept as a string
  # so a partial/zero date round-trips verbatim without timezone coercion.
  Date:
    type: string
  # FingerprintHash is an opaque hash string (md5/oshash/phash).
  FingerprintHash:
    type: string
